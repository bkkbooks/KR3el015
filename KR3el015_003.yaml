body:
  text: 卷三胸背部鎖子骨鎖子骨經名拄骨橫臥於兩肩缺盆之外其兩端外接肩解擊打損傷或騎馬乘車因取物偏墜於地斷傷此骨用手法先按胸再將肩端向內合之揉摩斷骨令其復位然後用帶挂臂於項勿令搖動內服人參紫金丹外尉定痛散再敷萬靈膏其證可愈人參紫金定痛散俱見山角骨傷萬靈膏見巔頂傷胸骨附脅肋胸肌即𩩲骭骨乃胸脅衆骨之統名也一名膺骨一名臆骨俗名胸膛其兩側自腋而下至肋骨之盡處統名曰脅脅下小肋骨名曰季脅俗名軟肋肋者單條骨之謂也統脅肋之總又名曰胠凡胸骨被物從前面撞打跌僕者重從後面撞僕者輕輕者先按證用手法治之再內服正骨紫金丹外用面麩和定痛散灸尉之或以海桐皮湯洗之貼萬靈膏即能獲效若內血瘀聚腫痛傴僂難仰者早晨以清上瘀血湯消下破血湯分上膈下膈以治之晚服疏血丸有受傷日久胸骨高起肌肉削瘦內有邪熱瘀血痞氣膨悶睛藍體倦痰喘咳嗽者宜加減紫金丹以消熱化痰理氣健脾潤肌定喘若傷重者內干胸中必通心肺兩臟其人氣亂昏迷閉目嘔吐血水厄逆戰栗者則危在旦夕不可醫治矣若兩側撅肋諸骨被傷者則相其輕重以分別治之凡胸脅諸傷輕者如黎洞丸三黃寶蠟丸等藥皆所必需宜酌用之清上瘀血湯治上膈被傷者羌活獨活連翹桔梗枳殼赤芍當歸酒洗山梔子黃芩甘草川芎桃仁紅花蘇木川大黃生地黃水煎加老酒童便和服消下破血湯治下膈被傷者柴胡川芎川大黃赤芍藥當歸梔子五靈脂木通枳實炒紅花赤牛膝澤蘭葉蘇木生地黃黃芩桃仁水煎加老酒童便和服加減紫金丹白茯苓蒼朮米泔浸炒各二兩當歸熟地黃白芍藥炒陳皮各四兩肉蓯蓉酒洗去鱗甲一兩丁香一錢紅花五錢瓜兒血竭三錢乳香去油三錢沒藥去油三錢共為細末煉蜜為丸彈子大用黃酒送下黎洞丸治跌打損傷瘀血奔心昏暈不省及一切無名腫毒昏困欲死等證京牛黃冰片麝香各二錢五分阿魏雄黃各一兩川大黃兒茶天竺黃三七瓜兒血竭乳香去油沒藥去油各二兩藤黃隔湯煮十數次去浮沫用山羊血五錢拌曬如無山羊血以子羊血代之二兩以上十三味共為細末將藤黃化開為丸如芡實大若干稍加白蜜外用蠟皮封固內服用無灰酒送下外敷用茶滷磨塗忌一切生冷發物三黃寶蠟丸專治一切跌打損傷及破傷風並傷力成癆女人産後惡露不盡致生怪證瘀血奔心痰迷心竅危在旦夕重者一錢輕者三分用無灰酒送下立刻全生如被鳥槍打傷鉛子在內危在頃刻服一錢吃酒數杯睡一時汗出即愈如外敷將香油熱化少許雞翎掃患處服藥後忌涼水生冷燒酒三日如不忌此酒則藥無功天竺黃三兩雄黃二兩劉寄奴紅芽大戟去骨麒麟竭各三兩歸尾一兩五錢硃砂兒茶各一兩淨乳香去油三錢琥珀輕粉水銀同輕粉研不見星麝香各三錢以上各稱足分兩各研為細末如無真天竺黃以真膽星三兩代之再用好黃蠟二十四兩煉淨滾湯坐定將藥投入不住手攪勻取出裝瓷罐內備用正骨紫金丹萬靈膏俱見巔頂骨傷定痛散見山角骨傷疏血丸見凌雲骨傷岐骨岐骨者即兩鳧骨端相接之處其下即鳩尾骨也內近心君最忌觸犯或打僕或馬撞則血必壅瘀而多疼痛輕者只在於膈上重者必入心臟致神昏目閉不省人事牙關緊閉痰喘鼻煽久而不醒醒而神亂此血瘀而堅凝不行者也難以回生如神不昏亂僅瘀痛不止胸滿氣促默默不語醒時猶能稍進飲食者宜早晨服加減蘇子桃仁湯加枳殼晚服疏血丸外貼萬靈膏再以炒熱定痛散尉之庶可愈也又凡周身骨之兩叉者皆名岐骨學者宜知之加減蘇子桃仁湯見巔頂骨傷疏血丸見凌雲骨傷萬靈膏見巔頂骨傷定痛散見山角骨傷蔽心骨蔽心骨即鳩尾骨也其質系脆骨在胸下岐骨之間跌打撞振傷損疼痛不止兩脅氣串滿腹疼痛腰傴不起兩手按胸者宜內服八釐散外用艾醋湯洗之敷萬靈膏渴飲淡黃酒忌茶水生冷粳米粥八釐散萬靈膏俱見巔頂骨傷鳧骨鳧骨者即胸下之邊肋也上下二條易被損傷左右皆然自此以上有肘臂護之難以著傷在下近腹者用手提之易治蓋其肋近邊可以著手則斷肋能復其位也其人必低頭傴腰痛苦呻吟惟側臥不能仰臥若立起五內皆痛或頭迷神昏飲食少進宜內服正骨紫金丹洗以八仙逍遙湯貼萬靈膏及散瘀等藥可愈若在上之第二肋或有斷裂墊傷塌陷不起因位居膈上難以入手雖強為之亦難完好其所傷之血留於膈上若不隨藥性開行必結成包囊其包輕者系黃水硬者系血塊則成痼疾矣正骨紫金丹見巔頂骨傷八仙逍遙湯見玉梁骨傷萬靈膏見巔頂骨傷陰囊凡陰囊被人扯破者用雞子黃油並金毛狗脊毛薄攤塗油於上次敷封口藥又用截血膏敷貼或烏龍膏敷貼亦可內服加減紫金丹洗用紫蘇葉煎水洗之凡陰囊有青黑紫色腫者用定痛膏加赤芍草烏良薑肉桂各少許打和用韭葉搗爛同貼如無韭葉用蔥葉亦可仍服利小水之藥定痛膏治打僕傷損動筋折骨跌磕木石壓傷腫痛芙蓉葉二兩紫荊皮獨活南星生白芷各五錢上共為末加馬齒莧一兩搗極爛和末一處用生蔥汁老酒和炒暖敷封口藥見鼻柱骨傷截血膏見唇口傷烏龍膏見凌雲骨傷加減紫金丹見胸骨傷背骨背者自後身大椎骨以下腰以上之通稱也其骨一名脊骨一名膂骨俗呼脊梁骨其形一條居中共二十一節下盡尻骨之端上載兩肩內系臟腑其兩旁諸骨附接橫疊而彎合於前則為胸脅也先受風寒後被跌打損傷者瘀聚凝結若脊筋隴起骨縫必錯則成傴僂之形當先揉筋令其和軟再按其骨徐徐合縫背膂始直內服正骨紫金丹再敷定痛散以燒紅鐵器烙之覺熱去敷藥再貼混元膏正骨紫金丹混元膏俱見巔頂傷定痛散見山角骨傷腰骨腰骨即脊骨十四椎十五椎十六椎間骨也若跌打損傷瘀聚凝結身必俯臥若欲仰臥側臥皆不能也疼痛難忍腰筋僵硬宜手法將兩旁脊筋向內歸附膂骨治者立於高處將病人兩手高舉則脊筋全舒再令病人仰面昂胸則膂骨正而患除矣內服補筋丸外貼萬靈膏灸尉止痛散止痛散止痛消腫活血通經闢風驅寒防風荊芥當歸蘄艾牡丹皮鶴蝨升麻各一錢苦參鐵線透骨草赤芍藥各二錢川椒三錢甘草八分共用末裝白布袋內扎口煎滾熏洗補筋丸見髃骨傷萬靈膏見巔頂傷尾骶骨尾骶骨即尻骨也其形上寬下窄上承腰脊諸骨兩旁各有四孔名曰八髎其末節名曰尾閭一名骶端一名橛骨一名窮骨俗名尾椿若蹲墊壅腫必連腰胯內服正骨紫金丹洗以海桐皮湯貼萬靈膏正骨紫金丹見巔頂傷海桐皮湯見兩顴骨傷萬靈膏見巔頂骨傷以上見背骨圖四肢部髃骨髃骨者肩端之骨即肩腫骨臼端之上稜骨也其臼含納臑骨上端其處名肩解即肩䯋與臑骨合縫處也俗名吞口一名肩頭其下附於脊背成片如翅者名肩胛亦名肩髆俗名鍁板子骨以上若被跌傷手必屈轉向後骨縫裂開不能抬舉亦不能向前惟扭於肋後而已其氣血皆壅聚於肘肘腫如椎其腫不能過腕兩手筋反脹瘀血凝滯如腫處痛如針刺不移者其血必化而為膿則腕掌皆涼或麻木若臑骨突出宜將突出之骨向後推入合縫再將臑筋向內撥轉則臑肘臂腕皆得復其位矣內服補筋丸外貼萬靈膏燙洗用海桐皮湯或敷白膠香散或金沸草汁塗之亦佳補筋丸此藥專治跌僕踒閃筋翻筋攣筋脹筋粗筋聚骨錯血脈壅滯宜腫青紫疼痛等證五加皮蛇床子好沉香丁香川牛膝白雲苓白蓮蕊肉蓯蓉菟絲子當歸酒洗熟地黃牡丹皮宣木瓜各一兩懷山藥八錢人參廣木香各三錢共為細末煉蜜為丸彈子大每丸重三錢用好無灰酒送下加減補筋丸當歸一兩熟地黃白芍藥各二兩紅花乳香白雲苓骨碎補各一兩廣陳皮二兩沒藥三錢丁香五錢共為細末煉蜜為丸彈子大每丸重三錢用好無灰酒送下白膠香散治皮破筋斷白膠香一味為細末敷之又方金沸草根搗汁塗筋封口二七日便可相續止痛一帖即愈不用再塗萬靈膏見巔頂骨傷海桐皮湯見兩顴骨傷臑骨臑骨即肩下肘上之骨也自肩下至手腕一名肱俗名胳膊乃上身兩大支之通稱也或墜車馬跌碎或打斷或斜裂或截斷或碎斷打斷者有碎骨跌斷者則無碎骨壅腫疼痛心神忙亂遍體麻冷皆用手法循其上下前後之筋令得調順摩按其受傷骨縫令得平正再將小杉板周圍逼定外用白布纏之內服正骨紫金丹外貼萬靈膏如壅腫不消外以散瘀和傷湯洗之正骨紫金丹萬靈膏散瘀和傷湯俱見巔頂骨傷肘骨肘骨者胳膊中節上下支骨交接處也俗名鵝鼻骨若跌傷其肘尖向上突出疼痛不止汗出戰栗用手法翻其臂骨拖肘骨令其合縫其斜彎之筋以手推摩令其平復雖即時能垂能舉仍當以養息為妙若壅腫疼痛宜內服正骨紫金丹外貼萬靈膏萬靈膏正骨紫金丹俱見巔頂骨傷臂骨臂骨者自肘至腕有正輔二根其在下而形體長大連肘尖者為臂骨其在上而形體短細者為輔骨俗名纏骨疊並相倚俱下接於腕骨焉凡臂骨受傷者多因迎擊而斷也或斷臂輔二骨或惟斷一骨瘀血凝結疼痛以手法接對端正貼萬靈膏竹簾裹之加以布條扎緊三日後開簾視之以手指按其患處或仍有未平再揉摩其瘀結之盤令復其舊換貼膏藥仍以竹簾裹之每日清晨服正骨紫金丹萬靈膏正骨紫金丹俱見巔頂骨傷腕骨腕骨即掌骨乃五指之本節也一名壅骨俗名虎骨其骨大小六枚湊以成掌非塊然一肌也基上並接臂輔兩骨之端其外側之骨名高骨一名鋭骨亦名踝骨俗名龍骨以其能宛屈上下故名曰腕若墜車馬手掌著地只能傷腕若手指著地其指翻貼於臂上者則腕縫必分開傷腕者壅腫疼痛法以兩手揉摩其腕內服正骨紫金丹外貼萬靈膏若手背向後翻貼於臂者以兩手促其手背輕輕回翻之令復其位仍按摩其筋必令調順內服人參紫金丹外敷混元膏正骨紫金丹萬靈膏混元膏俱見巔頂骨傷人參紫金丹見山角骨傷五指骨五指之骨名錘骨即各指本節之名也若被打折五指皆同株連腫痛因其筋皆相連也手掌與背其外體雖混一不分而其骨在內乃各指之本節相連而成者也若手背與手心皆堅硬壅腫熱痛必正其骨節則無後患若不即時調治其所壅之血後必化而為膿氣盛者服瘡毒之劑調治可愈氣虛者將來成漏矣洗以散瘀和傷湯貼萬靈膏散瘀和血湯萬靈膏俱見巔頂骨傷竹節骨竹節骨即各指次節之名也跌打損傷骨碎筋彎指不能伸以手捻其屈節則指必舒直洗以散瘀和傷湯貼以萬靈膏如指甲縫蓄積毒血其甲必脫落若再生指甲其形多不如舊若第三節有傷治同次節其指甲名爪甲散瘀和傷湯萬靈膏俱見巔頂骨傷胯骨胯骨即髖骨也又名髁骨若素受風寒濕氣再遇跌打損傷瘀血凝結腫硬筋翻足不能直行筋短者腳尖著地骨錯者臀努斜行宜手法推按胯骨復位將所翻之筋向前歸之其患乃除宜服加味健步虎潛丸熏洗海桐皮湯灸尉定痛散加味健步虎潛丸專治跌打損傷氣血虛衰下部腰胯膝腿疼痛痠軟無力步履艱難服此藥至一百日舒筋止痛活血補氣健旺精神龜膠蛤粉炒成珠鹿角膠蛤粉炒成珠虎脛骨酥油炙何首烏黑豆拌蒸曬各九次川牛膝酒洗曬乾杜仲薑汁炒斷絲鎖陽當歸酒洗炒乾各二兩威靈仙酒洗黃柏酒洗曬乾小鹽少許酒炒人參去蘆羌活乾薑白芍藥微炒云白朮土炒各一兩熟地黃三兩大川附子童便鹽水各一碗生薑二兩切片同煮一整日令極熟水乾再添鹽水煮畢取出剝皮切薄片又換淨水入川黃連五錢甘草五錢同煮長香三炷取出曬乾如琥珀明亮色方用一兩五錢共為細末煉蜜為丸如梧桐子大每服三錢空心淡鹽湯送下冬日淡黃酒送下海桐皮湯見兩顴骨傷定痛散見山角骨傷環跳環跳者髖骨外向之凹其形似臼以納髀骨之上端如杵者也名曰機又名髀樞即環跳穴處也或因跌打損傷或踒墊挂鐙以致樞機錯努青紫腫痛不能步履或行止欹側艱難宜先服正骨紫金丹洗以海桐皮湯貼萬靈膏常服健步虎潛丸正骨紫金丹見巔頂骨傷萬靈膏見巔頂骨傷海桐皮湯見兩顴骨傷虎潛丸見髖骨傷大楗骨一名髀骨上端如杵入於髀樞之臼下端如錘接於䯒骨統名曰股乃下身兩大支之通稱也俗名大腿骨墜馬擰傷骨碎筋腫黑紫清涼外起白泡乃因骨碎氣泄此證治之鮮效如人年少氣血充足者雖形證腫痛而不昏沉無白泡者可治法以兩手按摩碎骨推拿復位再以指頂按其傷處無錯落之骨用竹簾裹之每日早服正骨紫金丹俟三日後開簾視之若有不平處再捻筋結令其舒平貼萬靈膏仍以竹簾裹之正骨紫金丹見巔頂骨傷萬靈膏見巔頂骨傷膝蓋骨膝蓋骨即連骸亦名臏骨形圓而扁覆於楗䯒上下兩骨之端內面有筋聯屬其筋上過大腿至於兩脅下過胻骨至於足背如有跌打損傷膝蓋上移者其筋即腫大株連於膕內之筋膕內之筋上連腰胯故每有腰屈疼痛之證或下移胻骨則焮腫或足腹冷硬步履後拽斜行也若膝蓋離位向外側者則內筋腫大向內側者則筋直膕腫宜詳視其骨如何斜錯按法推拿以復其位內服補筋丸以定痛散灸尉之熏八仙逍遙湯則愈補筋丸見髃骨傷定痛散見山角骨傷八仙逍遙湯見玉梁骨傷胻骨胻骨即膝下踝上之小腿骨俗名臁脛骨者也其骨二根在前者名成骨又名骭骨其形粗在後者名輔骨其形細又俗名勞堂骨若被跌打損傷其骨尖斜突外出肉破血流不止疼痛呻吟聲細飲食少進若其人更氣血素弱必致危亡宜用手法按筋正骨令復其位貼萬靈膏以竹簾裹住再以白布纏之先服正骨紫金丹繼服健步虎潛丸萬靈膏正骨紫金丹俱見巔頂骨傷健步虎潛丸見髖骨傷踝骨踝骨者胻骨之下足跗之上兩旁突出之高骨也在內者名內踝俗名合骨在外者為外踝俗名核骨或馳馬墜傷或行走錯誤則後跟骨向前腳尖向後筋翻肉腫疼痛不止先用手法撥筋正骨令其復位再用竹板夾定跟骨縛於胻骨之上三日後解縛視之以枕支於足後用手扶筋再以手指點按其筋結之處必令端平內服正骨紫金丹灸尉以定痛散洗以海桐皮湯常服健步虎潛丸若稍愈後遽行勞動致胻骨之端向里歪者則內踝突出腫大向外歪者則外踝突出腫大血脈瘀聚凝結步履無力足底欹斜頗費調治故必待氣血通暢全復始可行動正骨紫金丹見巔頂骨傷定痛散見山角骨傷海桐皮見兩顴骨傷健步虎潛丸見髖骨傷跗骨跗者足背也一名足趺俗稱腳面其骨乃足趾本節之骨也其受傷之因不一或從隕墜或被重物擊壓或被車馬踹砑若僅傷筋肉尚屬易治若骨體受傷每多難治先以手法輕輕搓摩令其骨合筋舒洗以海桐皮八仙逍遙等湯貼以萬靈膏內服舒筋定痛之劑及健步虎潛丸補筋丸海桐皮湯見山角骨傷八仙逍遙湯見玉梁骨傷健步虎潛丸見髖骨傷補筋丸見髃骨傷足五趾骨趾者足之指也名以趾者所以別於手也俗名足節其節數與手之骨節同大指本節後內側圓骨努突者一名核骨又名核骨俗呼為孤拐也趾骨受傷多與跗骨相同惟奔走急迫因而受傷者多治法與跗骨同跟骨跟骨者足後跟骨也上承胻輔二骨之末有大筋附之俗名腳攣筋其筋從跟骨過踝骨至腿肚裡上至膕中過臀抵腰脊至頂自腦後向前至目眥皆此筋之所達也若落馬墜蹬等傷以至跟骨擰轉向前足趾向後即或骨未碎破而縫隙分離自足至腰脊諸筋皆失其常度拳攣疼痛宜撥轉如舊藥餌調治皆同前法按正骨紫金丹混元膏散瘀和傷湯海桐皮湯萬靈膏諸藥皆內庭常用經驗之方故以上諸證多引用之其或跌打損傷證中而又兼他病者則不止此數藥也故採前人舊載諸方集於末卷以示證治之法有不可狹隘者焉
