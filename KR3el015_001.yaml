body:
  text: 卷一外治法手法總論夫手法者謂以兩手安置所傷之筋骨使仍復於舊也但傷有重輕而手法各有所宜其痊可之遲速及遺留殘疾與否皆關乎手法之所施得宜或失其宜或未盡其法也蓋一身之骨體既非一致而十二經筋之羅列序屬又各不同故必素知其體相識其部位一旦臨證機觸於外巧生於內手隨心轉法從手出或拽之離而復合或推之就而復位或正其斜或完其闕則骨之截斷碎斷斜斷筋之弛縱卷攣翻轉離合雖在肉裡以手捫之自悉其情法之所施使患者不知其苦方稱為手法也況所傷之處多有關於性命者如七竅上通腦髓膈近心君四末受傷痛苦入心者即或其人元氣素壯敗血易於流散可以剋期而愈手法亦不可亂施若元氣素弱一旦被傷勢已難支設手法再誤則萬難挽回矣此所以尤當審慎者也蓋正骨者須心明手巧既知其病情復善用夫手法然後治自多效誠以手本血肉之體其宛轉運用之妙可以一己之卷舒高下疾徐輕重開合能達病者之血氣凝滯皮肉腫痛筋骨攣折與情志之苦欲也較之以器具從事於拘制者相去甚遠矣是則手法者誠正骨之首務哉手法釋義摸法摸者用手細細摸其所傷之處或骨斷骨碎骨歪骨整骨軟骨硬筋強筋柔筋歪筋正筋斷筋走筋粗筋翻筋寒筋熱以及表裡虛實並所患之新舊也先摸其或為跌僕或為錯閃或為打撞然後依法治之接法接者謂使已斷之骨合攏一處復歸於舊也凡骨之跌傷錯落或斷而兩分或折而陷下或碎而散亂或岐而旁突相其形勢徐徐接之使斷者復續陷者復起碎者復完突者復平或用手法或用器具或手法器具分先後而兼用之是在醫者之通達也端法端者兩手或一手擒定應端之處酌其重輕或從下往上端或從外向內托或直端斜端也蓋骨離其位必以手法端之則不待曠日遲久而骨縫即合仍須不偏不倚庶愈後無長短不齊之患提法提者謂陷下之骨提出如舊也其法非一有用兩手提者有用繩帛系高處提者有提後用器具輔之不致仍陷者必量所傷之輕重淺深然後施治倘重者輕提則病莫能愈輕者重提則舊患雖去而又增新患矣按摩法按者謂以手往下抑之也摩者謂徐徐揉摩之也此法蓋為皮膚筋肉受傷但腫硬麻木而骨未斷折者設也或因跌僕閃失以致骨縫開錯氣血鬱滯為腫為痛宜用按摩法按其經絡以通鬱閉之氣摩其壅聚以散瘀結之腫其患可愈推拿法推者謂以手推之使還舊處也拿者或兩手一手捏定患處酌其宜輕宜重緩緩焉以復其位也若腫痛已除傷痕已愈其中或有筋急而轉搖不甚便利或有筋縱而運動不甚自如又或有骨節間微有錯落不合縫者是傷雖平而氣血之流行未暢不宜接整端提等法惟宜推拿以通經絡氣血也蓋人身之經穴有大經細絡之分一推一拿視其虛實酌而用之則有宣通補瀉之法所以患者無不愈也以上諸條乃八法之大略如此至於臨證之權衡一時之巧妙神而明之存乎其人矣器具總論跌僕損傷雖用手法調治恐未盡得其宜以致有治如未治之苦則未可云醫理之周詳也因身體上下正側之象制器以正之用輔手法之所不逮以冀分者復合欹者復正高者就其平陷者升其位則危證可轉於安重傷可就於輕再施以藥餌之功更示以調養之善則正骨之道全矣裹簾器一無圖裹簾以白布為之因患處不宜他器只宜布纏始為得法故名裹簾其長短闊狹量病勢用之振挺器二無圖振挺即木棒也長尺半圓如錢大或麵杖亦可蓋受傷之處氣血凝結疼痛腫硬用此挺微微振擊其上下四旁使氣血流通得以四散則疼痛漸減腫硬漸消也用法釋義凡頭被傷而骨未碎筋未斷雖瘀聚腫痛者皆為可治先以手法端提頸項筋骨再用布纏頭二三層令緊再以振挺輕輕拍擊足心令五臟之氣上下宣通瘀血開散則不奔心亦不嘔厄而心神安矣若已纏頭拍擊足心竟不覺疼昏不知人痰響如曳鋸身體僵硬口溢涎沫乃氣血垂絶也不治披肩器三無圖披肩者用熟牛皮一塊長五寸寬三寸兩頭各開二孔夾於傷處以棉繩穿之緊緊縛定較之木板稍覺柔活用法釋義凡兩肩撲墜閃傷其骨或斷碎或旁突或斜努或骨縫開錯筋翻法當令病人仰臥凳上安合骨縫揉按筋結先以棉花貼身墊好復以披肩夾住肩之前後縛緊再用白布在外纏裹畢更用扶手板長二尺余寬三四寸兩頭穿繩懸空掛起令病人俯伏於上不使其肩骨下垂過七日後開視之如俱痊可撤板不用如尚未愈則仍用之若不依此治法後必遺殘患蘆節攀索器四攀索者以繩掛於高處用兩手攀之也疊磚器五疊磚者以磚六塊分左右各疊置三塊兩足踏於其上也用法釋義凡胸腹腑脅跌打蹦撞墊努以致胸陷而不直者先令病人以兩手攀繩足踏磚上將後腰拿住各抽去磚一個令病人直身挺胸少頃又各去磚一個仍令直身挺胸如此者三其足著地使氣舒瘀散則陷者能起曲者可直也再將其胸以竹簾圍裹用寬帶八條緊緊縛之勿令窒礙但宜仰睡不可俯臥側眠腰下以枕墊之勿令左右移動通木器六用杉木寬三寸厚二寸其長自腰起上過肩一寸許外面平整向脊背之內面刻凹形務與脊骨膂肉吻合約以五分分去聲度之第一分自左側面斜鑽二孔右側面斜鑽二孔越第二分至第三分四分五分俱自左右側面各斜鑽一孔用寬帶一條自第一分上左孔穿入上越右肩下胸前斜向左腑下繞背後穿於第一分右次孔內再用一帶自第一分上右孔穿入上越左肩下胸前斜向右腋下繞背後穿入第一分左次孔內兩帶頭俱折轉緊扎木上第三分四分亦以帶穿之自軟肋橫繞腹前復向後穿入原孔內緊扎木上第五分以帶穿入孔內平繞前腹復向後緊扎木上切勿遊移活動始於患處有益凡用此木先以綿絮軟帛貼身墊之免致疼痛用法釋義凡脊背跌打損傷膂骨開裂高起者其人必傴僂難仰法當令病者俯臥再著一人以兩足踏其兩肩醫者相彼開裂高起之處宜輕宜重或端或拿或按或揉令其縫合然後用木依前法逼之腰柱器七腰柱者以杉木四根制如扁擔形寬一寸厚五分長短以患處為度俱自側面鑽孔以繩聯貫之用法釋義凡腰間閃挫岔氣者以常法治之若腰節骨被傷錯筍膂肉破裂筋斜傴僂者用醋調定痛散敷於腰柱上視患處將柱排列於脊骨兩旁務令端正再用蘄艾做薄褥覆於柱上以御風寒用寬長布帶繞向腹前緊緊扎裹內服藥餌調治自愈竹簾器八竹簾者即夏月涼簾也量患處之大小長短裁取之用法釋義凡肢體有斷處先用手法安置訖然後用布纏之復以竹簾圍於布外緊扎之使骨縫無參差走作之患乃通用之物也杉籬器九杉籬者復逼之器也量患處之長短闊狹曲直凸凹之形以杉木為之酌其根數記清次序不得紊亂然後於每根兩頭各鑽一孔以繩聯貫之有似於籬故名焉但排列稀疏不似竹簾之密耳用法釋義凡用以圍裹於竹簾之外將所穿之繩結住再於籬上加繩以纏之取其堅徑挺直使骨縫無離綻脫走之患也蓋骨節轉動之處以骨節甚長之所易於搖動若僅用竹簾恐挺徑之力不足故必加此以環抱之則骨縫吻合堅牢矣抱膝器十抱膝者有四足之竹圈也以竹片作圈較膝蓋稍大些須再用竹片四根以麻線緊縛圈上作四足之形將白布條通纏於竹圈及四足之上用於膝蓋雖拘制不致痛苦矣用法釋義膝蓋骨覆於楗䯒二骨之端本活動物也若有所傷非骨體破碎即離位而突出於左右雖用手塵推入原位但步履行止必牽動於彼故用抱膝之器以固之庶免復離原位而遺跛足之患也其法將抱膝四足插於膝蓋兩旁以竹圈轄住膝蓋令其穩妥不得移動再用白布寬帶緊緊縛之經義擊僕損傷應刺諸穴經義素問繆刺論曰人有所墮墜惡血留內腹中滿脹不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡刺足內踝之下然谷之前血脈出血刺足跗上動脈不已刺三毛各一痏見血立已左刺右右刺左注此言惡血為病有繆刺之法也人因墮墜致惡血留內腹中滿脹前後不通當先用利藥如上傷厥陰肝經之脈下傷少陰腎經之絡當刺內踝之下然谷之前有血脈令出血者蓋以此屬少陰之別絡而交通乎厥陰也兼刺足跗上動脈即衝陽穴乃胃經之原也如病不已更刺三毛上大敦穴左右各一痏見血立已繆刺者左刺右大敦右刺左大敦也但足跗動脈上關衝脈少陰陽明三經只宜淺刺不可出血不已也靈樞經寒熱病篇曰身有所傷血出多及中風寒若有所墮墜四支懈惰不收名曰體惰取其小腹臍下三結交三結交者陽明太陰也臍下三寸關元也注此言身有所傷血出多者及中風寒者破傷風之屬也或因墮墜不必血出而四支懈惰不收者皆名體惰也關元任脈穴名又足陽明太陰之脈皆結於此故為三結交也靈樞經厥病論曰頭痛不可取於腧者有所擊墮惡血在內傷痛未已可側刺不可遠取之也注經言惡血在內頭痛不可取其腧者蓋頭痛取腧以泄其氣則頭痛可愈也若有所擊墮惡血在內而取腧以泄其氣則是血病治氣矣故勿取其腧焉若所擊僕之䐃肉傷痛不已雖用刺法亦只於所傷附近之側刺之以出在內之惡血而已若仍按經遠取諸腧以療頭痛則不可也惡血已留復因怒傷肝經義靈樞經邪氣臟腑病形篇曰有所墮墜惡血在內有所大怒氣上而不下積於脅下則傷肝注人因墮墜血已留內若復因大怒傷肝其氣上而不下則留內之血兩相凝滯積於脅下而肝傷矣法當先導怒氣勿積於肝則肝可以無傷然後飲以利藥以破惡血則脅下無留血矣擊僕傷後入房傷脾經義靈樞經邪氣臟腑病形篇曰有所擊僕若醉入房汗出當風則傷脾注有所擊僕乃傷其外體也如醉後入房或汗出不知避忌當風則邪客於肌膚傷其內體矣是皆傷脾之因也擊僕損傷脈色經義素問脈要精微論曰肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆注此言肝脈有剛柔而病亦以異也肝脈搏擊於手而且堅且長其色又不青當病或墜或搏因血積於脅下令人喘逆不止也正以厥陰之脈布脅肋循喉嚨之後其支別者復從肝貫膈上注肺今血在脅下則血之積氣上熏於肺故令人喘逆也金匱要略曰寸口脈浮微而澀然當亡血若汗出設不汗出者其身有瘡被刀斧所傷亡血故也注經言奪血者無汗奪汗者無血蓋二者皆當脈浮微而澀今診之如此是有枯竭之象而無汗出之證非亡血而何故知有金傷或擊僕而亡血之證也又論曰肝脈搏堅而色不變必有擊墮之事因肉無破則惡血必留脅下兼致嘔逆依經針刺然谷足跗或三毛等穴出血或飲利藥使惡血開行當自愈也若脈浮微而澀當知亡血過多依經於三結交關元穴灸之或飲大補氣血之劑而調之則病已矣靈樞經骨度尺寸頭部項發以下至背骨長二寸半自後髮際以至大椎項骨三節處也按頭部折法以前髮際至後髮際折為一尺二寸如髮際不明則取眉心直上後至大杼骨折作一尺八寸此為直寸橫寸法以眼內角至外角此為一寸頭部橫直寸法並依此胸腹部結喉以下至缺盆中長四寸此以巨骨上陷中而言即天突穴處缺盆以下𩩲骭之中長九寸胸圍四尺五寸兩乳之間廣九寸半當折八寸為當𩩲骭中下至天樞長八寸天樞足陽明穴名在臍旁此指平臍而言天樞以下至橫骨長六寸半橫骨橫長六寸半毛際下骨曰橫骨按此古數以今用上下穴法參較多有未合宜從後胸腹折法為當兩髀之間廣六寸半此當兩股之中橫骨兩頭之處俗名髀縫按胸腹折法直寸以中行為之自缺盆中天突穴起至岐骨際上中庭穴止折作八寸四分自𩩲骭上岐骨際下至臍心折作八寸臍心下至毛際曲骨穴折作五寸橫寸以兩乳相去折作八寸胸腹橫直寸法並依此背部膂骨以下至尾骶二十一節長三尺膂骨脊骨也脊骨外小而內巨人之所以能負任者以是骨之巨也脊骨二十四節今云二十一凶者除項骨三節不在內腰圍四尺二寸按背部折法自大椎至尾骶通折三尺上七節各長一寸四分一釐共九寸八分七釐中七節各一寸六分一釐共一尺一寸二分七釐第十四節與臍平下七節各一寸二分六釐共八寸八分二釐共二尺九寸九分六釐不足四釐者有零未盡也直寸依此橫寸用中指同身寸法脊骨內闊一寸凡云第二行挾脊一寸半三行挾脊三寸者皆除脊一寸外淨以寸半三寸論故在二行當為二寸在三行當為三寸半也側部自柱骨下行腋中不見者長四寸柱骨頸項根骨也腋以下至季脅長一尺二寸季脅小肋也季脅以下至髀樞長六寸大腿曰股股上曰髀楗骨之下大腿之上兩骨合縫之所曰髀樞當足少陽環跳穴處也髀樞下至膝中長一尺九寸橫骨上廉下至內輔之上廉長一尺八寸骨際曰廉膝旁之骨突出者曰輔骨內曰內輔外曰外輔內輔之上廉以下至下廉長三寸半上廉下廉可摸而得內輔下廉下至廉長三寸半上廉下廉可摸而得內輔下廉下至內踝長一尺二寸內踝以下至地長三寸四肢部肩至肘長一尺七寸肘至腕長一尺二寸半臂之中節曰肘腕至中指本節長四寸臂掌之交曰腕本節至末長四寸半指之後節曰本節膝以下至外踝長一尺六寸膝膕以下至跗屬長一尺二寸膕腿灣也跗足面也膝在前膕在後跗屬者凡兩踝前後脛掌所交之處皆為跗之屬也跗屬以下至地長三寸外踝以下至地長一寸足長一尺二寸廣四寸半按骨度乃靈樞經骨度篇之文論骨之長短皆古數也然骨之大者則太過小者則不及此亦言其則耳其周身手足折量之法用前中指同身寸法為是同身寸量法詳刺灸書中補遺十不治證顛仆損傷入於肺者縱未即死二七難過左脅下傷透至內者腸傷斷者小腹下傷內者證候繁多者傷破陰子者老人左股壓碎者血出盡者肩內耳後傷透於內者脈不實重者以上皆不必用藥
