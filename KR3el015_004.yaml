body:
  text: 卷四內治雜證法方法總論今之正骨科即古跌打損傷之證也專從血論須先辨或有瘀血停積或為亡血過多然後施以內治之法庶不有誤也夫皮不破而內損者多有瘀血破肉傷䐃每致亡血過多二者治法不同有瘀血者宜攻利之亡血者宜補而行之但出血不多亦無瘀血者以外治之法治之更察其所傷上下輕重淺深之異經絡氣血多少之殊必先逐去瘀血和榮止痛然後調養氣血自無不效若夫損傷雜證論中不及備載者俱分門析類詳列於後學者宜盡心焉傷損內證凡跌打損傷墜墮之證惡血留內則不分何經皆以肝為主蓋肝主血也故敗血凝滯從其所屬必歸於肝其痛多在脅肋小腹者皆肝經之道路也若壅腫痛甚或發熱自汗皆宜斟酌虛實然後用調血行經之藥王好古云登高墜下撞打等傷心腹胸中停積瘀血不散者則以上中下三焦分別部位以施藥餌瘀在上部者宜犀角地黃湯瘀在中部者宜桃仁承氣湯瘀在下部者宜抵當湯之類須於所用湯中加童便好酒同煎服之虛人不可下者宜四物湯加穿山甲若瘀血已去則以復元通氣散加當歸調之內經云形傷作痛氣傷作腫又云先腫而後痛者形傷氣也先痛而後腫者氣傷形也凡打僕閃錯或惱怒氣滯血凝作痛及元氣素弱或因叫號血氣損傷或過服克伐之劑或外敷寒涼之藥致氣血凝結者俱宜用活血順氣之劑後列諸方以備選用犀角地黃湯犀角生地黃酒浸另搗丹皮白芍各等分水煎服桃仁承氣湯大黃芒硝桃仁桂枝甘草水煎服以利為度抵當湯水蛭虻蟲去翅足各三十枚大黃酒浸三兩桃仁去皮尖三十枚水煎去渣取三升溫服一升不下再服復元活血湯柴胡五錢當歸穿山甲炮栝蔞根各三錢甘草紅花各二錢桃仁去皮尖五十個大黃酒浸一兩上將桃仁研爛余藥銼如麻豆大每服一兩水二盅酒半盞煎至七分去渣大溫食前服以利為度巴戟湯巴戟去心大黃各半兩當歸地黃芍藥川芎各一兩上為末水煎服以利為度破血消痛湯羌活防風官桂各一錢蘇木一錢半柴胡連翹當歸梢各二錢麝香另研少許水蛭炒去煙盡另研二錢上為粗末共一服酒二大盞水一盞水蛭麝香另研如泥余藥煎至一大盞去火稍熱調二味服之兩服立愈清心藥牡丹皮當歸川芎赤芍藥生地黃黃芩黃連連翹梔子桃仁甘草各等分上引用燈心草薄荷煎入童便和服止痛藥當歸牛膝川芎懷慶生地赤芍藥白芷羌活獨活杜仲續斷各一兩肉桂八角茴香乳香沒藥各五錢南木香丁皮沉香血竭各二錢半上為末老酒調用活血順氣何首烏散何首烏三錢當歸赤芍藥白芷烏藥枳殼防風甘草川芎陳皮香附紫蘇羌活獨活肉桂各一錢上薄荷生地黃煎入酒和服疼痛甚者加乳香沒藥調經散川芎當歸芍藥黃耆各一錢半青皮烏藥陳皮熟地黃乳香各一錢上作一服水二盅煎至一盅不拘時服牡丹皮散牡丹皮當歸骨碎補紅花酒浸續斷乳香沒藥桃仁川芎赤芍藥生地黃各等分上水酒煎服卻用秫米飯熱罨縛冷又蒸熱換縛橘術四物湯當歸川芎白芍藥懷慶生地各二錢陳皮白朮紅花各一錢桃仁十枚上生地黃煎服骨節疼加羌活獨活痛不止加乳香沒藥當歸補血湯當歸川芎白芍藥熟地黃防風連翹羌活獨活乳香沒藥白芷續斷杜仲各等分上生地黃煎入童便和服不可用酒氣虛加人參白朮黃耆復元通氣散木香茴香炒青皮去皮穿山甲酥炙陳皮白芷甘草漏蘆貝母各等分上為末每服一二錢溫酒調下傷損出血傷損之證或患處或諸竅出血者此肝火熾盛血熱錯經而妄行也用加味逍遙散清熱養血若中氣虛弱血無所附而妄行用加味四君子湯補中益氣湯或元氣內脫不能攝血用獨參湯加炮薑以回陽如不應急加附子如血蘊於內而嘔血者用四物湯加柴胡黃芩凡傷損而犯勞碌或怒氣肚腹脹悶或過服寒毒等藥致傷陽絡者則為吐血衄血便血尿血傷於陰絡者則為血積血塊肌肉青黑此皆臟腑虧損經隧失職急補脾肺二臟自愈矣加味逍遙散白朮茯苓當歸白芍各二錢柴胡一錢薄荷五分黑梔丹皮各一錢五分水煎服補中益氣湯人參二錢黃耆炙二錢白朮炒一錢五分當歸一錢五分升麻五分柴胡五分陳皮八分甘草炙三分引用薑棗水煎服四君子湯人參白朮茯苓各二錢甘草炙一錢引用薑棗水煎服四物湯當歸三錢川芎白芍藥二錢熟地黃三錢水煎服獨參湯人參一兩水煎服瘀血泛注傷損瘀血泛注之證乃跌僕血滯所致蓋氣流而注血注而凝或注於四肢關節或留於胸腹腰臀或漫腫或結塊初起皆屬肝脾鬱火急用蔥尉法內服小柴胡湯以清肝火次用八珍湯以壯脾胃或益氣養榮湯久服自然收功若日久潰破而氣血虛者宜十全大補湯若潰而寒邪凝滯不斂者宜豆豉餅祛散之此證若不補氣血不慎起居不戒七情或用寒涼克伐俱屬不治小柴胡湯柴胡二錢黃芩一錢五分半夏制人參各一錢甘草炙五分引用薑二片水煎服八珍湯即四君子湯四物湯相和為劑也益氣養榮湯人參黃耆炒當歸川芎熟地黃白芍炒香附貝母茯苓陳皮各一錢白朮二錢柴胡六分甘草桔梗各五分引用薑水煎服口乾加五味子麥冬往來寒熱加青皮十全大補湯即八珍湯加黃耆肉桂各一錢豆豉餅江西豆豉上一味為末唾津和作餅子如錢大厚二分置患處以艾壯於餅上灸之干則再易蔥尉法方見囟骨傷瘀血作痛傷損之證腫痛者乃瘀血凝結作痛也若脹而重墜色或青黑甚則發熱作渴汗出者乃經絡壅滯陰血受傷也宜先刺去惡血以通壅塞後用四物湯以調之四物湯方見傷損出血血虛作痛傷損之證血虛作痛者其證則發熱作渴煩悶頭暈日晡益甚此陰虛內熱之證宜八珍湯加丹皮麥冬五味子肉桂骨碎補治之八珍湯方見瘀血泛注嘔吐黑血傷損嘔吐黑血者始因打僕傷損敗血流入胃脘色黑如豆汁從嘔吐而出也形氣實者用百合散形氣虛者加味芎藭湯百合散川芎赤芍藥當歸百合生地側柏葉荊芥犀角丹皮黃芩黃連梔子鬱金大黃各一錢水煎加童便和服加味芎藭湯芎藭當歸白朮百合水浸一日荊芥各一錢水一盅半酒半盅煎八分不拘時服發熱傷損之發熱者若因出血過多脈洪大而虛重按之全無者此血虛發熱也用當歸補血湯脈若沉微按之軟弱者此陰盛發熱也宜用四君子湯加炮薑附子若發熱煩躁肉瞤筋惕者此亡血也宜用聖愈湯如發熱汗出不止者此血脫也宜用獨參湯血脫之證其脈實者難治細小者易治當歸補血湯黃耆炙一兩當歸三錢水煎服聖愈湯人參川芎當歸熟地黃生地黃耆炙各等分水煎服四君子湯獨參湯俱見傷損出血肌肉作痛傷損之證肌肉作痛者乃榮衛氣滯所致宜用復元通氣散筋骨間作痛者肝腎之氣傷也用六味地黃丸六味地黃丸熟地黃八兩山萸肉去核四兩懷山藥四兩牡丹皮三兩澤瀉三兩茯苓三兩共為末煉蜜丸桐子大空心白湯服三錢復元通氣散方見傷損內證骨傷作痛傷損之證骨傷作痛者乃傷之輕者也若傷重則或折或碎須用手法調治之其法已詳列前篇此乃磕蹦微傷骨間作痛肉色不變宜外用蔥尉法內服沒藥丸日間服地黃丸自愈矣沒藥丸沒藥去油乳香去油川芎川椒去閉口及目芍藥當歸各半兩自然銅火煅淬七次二錢半上為細末用黃蠟二兩熔化入藥末攪勻丸彈子大每服一丸酒一盅化開煎五分熱服蔥尉法方見囟骨傷地黃丸方見肌肉作痛胸腹痛悶傷損之證胸腹痛悶者多因跳躍捶胸閃挫舉重勞役恚怒所致其胸腹喜手摸者肝火傷脾也用四君子湯加柴胡山梔如畏手摸者肝經血滯也用四物湯加柴胡山梔桃仁紅花若胸脅悶痛發熱晡熱肝經血傷也用加味逍遙散若胸脅悶痛飲食少思肝脾氣傷也用四君子湯加芎歸柴梔丹皮若胸腹脹滿飲食少思肝脾氣滯也用六君子湯加柴胡芎歸若胸腹不利食少無寐脾氣鬱結也用加味歸脾湯若痰氣不利脾肺氣滯也用二陳湯加白朮芎歸山梔大麻鉤藤鉤如因過用風熱之藥致肝血受傷肝火益甚或飲糖酒則腎水益虛脾火益熾若用大黃芍藥內傷陰絡反致下血少壯者必成痼疾老弱者多致不起加味歸脾湯黑梔一錢牡丹皮一錢人參一錢黃耆炙一錢五分白朮炒一錢五分茯神二錢棗仁炒一錢五分當歸一錢木香五分遠志去心八分圓肉二錢甘草炙五分引用薑棗水煎服二陳湯陳皮一錢五分半夏制二錢茯苓二錢甘草五分引用薑水煎服六君子湯即四君子湯加陳皮半夏各一錢五分引用薑棗水煎服四君子湯四物湯加味逍遙湯俱見傷損出血脅肋脹痛傷損脅肋脹痛之證如大便通和喘咳吐痰者肝火侮肺也用小柴胡湯加青皮山梔清之若胸腹脹痛大便不通喘咳吐血者乃瘀血停滯也用當歸導滯散通之內經云肝藏血脾統血蓋肝屬木木勝侮土其脾氣必虛宜先清肝養血則瘀血不致凝滯次壯脾胃則氣血充盛若行克伐則虛者益虛滯者益滯禍不旋踵矣當歸導滯散川大黃一兩當歸二錢五分麝香少許上三味除麝香另研外為極細末後入麝香令勻每服三錢熱酒一杯調下又方川大黃當歸各二兩上共為細末每服三錢不拘時溫酒調服小柴胡湯方見瘀血泛注腹痛傷損腹痛之證如大便不通按之痛甚者瘀血在內也用加味承氣湯下之既下而痛不止按之仍痛瘀血未盡也用加味四物湯補而行之若腹痛按之反不痛者血氣傷也用四物湯加參耆白朮補而和之若下而胸脅反痛肝血傷也用四君子湯加芎歸補之既下而發熱陰血傷也用四物湯加參朮補之既下而惡寒陽氣傷也用十全大補湯補之既下而惡寒發熱者氣血傷也用八珍湯補之下而欲嘔者胃氣傷也用六君子湯加當歸補之下而泄瀉者脾腎傷也用六君子湯加肉果補骨脂補之若下後手足俱冷昏憒出汗陽氣虛寒也急用參附湯若吐瀉而手足俱冷指甲青者脾腎虛寒之甚也急用大劑參附湯口噤手撒遺尿痰盛唇青體冷者虛極之壞證也急用大劑參附湯多有得生者加味承氣湯大黃朴硝各二錢枳實厚朴當歸紅花各一錢甘草五分水酒各半煎服參附湯人參或五錢或一兩製附子或三錢或五錢引用薑水煎服四君子湯四物湯俱見傷損出血六君子湯方見胸腹痛悶八珍湯十全大補湯俱見瘀血泛注少腹引陰莖作痛傷損而少腹引陰莖作痛者乃瘀血不行兼肝經鬱火所致宜用小柴胡湯加大黃黃連山梔服之待痛勢已定再用養血之劑自無不愈矣此病若誤認為寒證而投以熱藥重則必危輕則損目治者宜慎之小柴胡湯方見瘀血泛注腰痛傷損腰痛脊痛之證或因墜墮或因打僕瘀血留於太陽經中所致宜地龍散治之地龍散地龍官桂蘇木各九分麻黃七分黃柏當歸尾各二錢五分桃仁九個甘草三錢五分上水煎食前服眩暈傷損之證頭目眩暈有因服克伐之劑太過中氣受傷以致眩暈者有因亡血過多以致眩暈者如兼腹脹嘔吐宜用六君子湯兼發熱作渴不思飲食者宜十全大補湯六君子湯方見胸腹痛悶十全大補湯方見瘀血泛注煩躁傷損之證煩躁而面赤口乾作渴脈洪大按之如無者宜用當歸補血湯如煩躁自汗頭暈宜用獨參湯如煩躁不寐宜用加味歸脾湯如煩躁脅痛宜用柴胡四物湯如亡血過多煩躁者宜用聖愈湯加味歸脾湯方見胸腹痛悶當歸補血湯聖愈湯俱見發熱柴胡四物湯即四物湯加柴胡黃芩方見傷損出血獨參湯方見傷損出血喘咳傷損之證而喘咳者若因出血過多面黑胸脹胸膈痛而發喘者乃氣虛血乘於肺也急用二味參蘇飲緩則難救若咳血衄血而喘者乃氣逆血蘊於肺也只宜活血行氣不可用下法宜十味參蘇飲治之二味參蘇飲人參一兩蘇木二兩水煎服十味參蘇飲人參紫蘇半夏茯苓陳皮桔梗前胡葛根枳殼各一錢甘草五分引用薑二片水煎服昏憒傷損昏憒乃傷之至重以致昏憒不知人事宜急灌以獨參湯雖內有瘀血斷不可下急用花蕊石散內化之蓋恐下之因瀉而亡陰也若元氣虛甚者尤不可下亦用前散以化之凡瘀血在內大便不通用大黃朴硝血凝而不下者須用木香肉桂二三錢以熱酒調灌服之血下乃生怯弱之人用硝黃而必加木香肉桂同煎者乃假其熱以行其寒也花蕊石散石硫黃四兩花蕊石二兩上二味合勻用瓦罐一個入藥在內封口外用紙筋鹽泥周圍固濟候泥干安四方磚上書八卦五行字用炭十斤籠疊周匝自午時從下著火漸漸上徹直至經宿炭盡火冷又放經宿罐冷取出研細用絹羅羅過瓷盒收貯每服三錢以童便調服作嘔傷損作嘔若因痛甚或因克伐而傷胃者宜四君子湯加當歸半夏生薑因忿怒而肝傷者用小柴胡湯加山梔茯苓因痰火盛者用二陳湯加薑炒黃連山梔因胃氣虛者用補中益氣湯加生薑半夏因出血過多者用六君子湯加當歸四君子湯補中益氣湯俱見傷損出血小柴胡湯方見瘀血泛注二陳湯六君子湯俱見胸腹痛悶作渴傷損作渴若因亡血過多者用四物湯加人參白朮如不應用人參黃耆以補氣當歸熟地以補血或用八珍湯若胃熱傷津液者用竹葉黃耆湯如胃虛津液不足用補中益氣湯如胃火熾盛用竹葉石膏湯若煩熱作渴小便淋澀乃腎經虛熱非地黃丸不能救竹葉黃耆湯淡竹葉二錢人參黃耆生地黃當歸川芎麥冬芍藥甘草石膏煅黃芩炒半夏各一錢水煎服竹葉石膏湯竹葉三把石膏一斤人參三兩甘草炙二兩麥冬一升半夏半升粳米半升引用生薑水煎服四物湯補中益氣湯俱見傷損出血八珍湯方見瘀血泛注六味地黃丸方見肌肉作痛祕結傷損之證大便祕結若因大腸血虛火熾者用四物湯送潤腸丸或以豬膽汁導之若腎虛火燥者用六味地黃丸若腸胃氣虛用補中益氣湯若大便祕結裡實氣壯腹痛堅硬者用玉燭散潤腸丸大黃當歸尾羌活各五錢桃仁麻仁各一兩上為末煉蜜丸彈子大空心白湯送下豬膽汁導法大豬膽一枚瀉汁和法醋少許以灌穀道內如一時頃當大便出宿食惡物甚效玉燭散生地黃當歸川芎赤芍藥大黃酒浸芒硝引用生薑水煎服四物湯補中益氣湯俱見傷損出血六味地黃丸方見肌肉作痛挾表傷損之外挾表邪者其脈必浮緊證則發熱體痛形氣實者宜疏風敗毒散形氣虛者宜加味交加散或羌活乳香湯以散之疏風敗毒散當歸川芎白芍藥熟地黃羌活獨活桔梗枳殼柴胡白茯苓白芷甘草紫蘇陳皮香附上生薑生地黃煎入酒和服加味交加散當歸川芎白芍藥生地黃蒼朮厚朴陳皮白茯苓半夏羌活獨活桔梗枳殼前胡柴胡乾薑肉桂甘草上生薑煎服有熱者去乾薑肉桂羌活乳香湯羌活獨活川芎當歸赤芍藥防風荊芥丹皮續斷紅花桃仁乳香上生地黃煎服有熱者加柴胡黃芩補遺方補損續筋丸治跌打僕墜骨碎筋斷肉破疼痛不息當歸酒洗五錢川芎白芍炒熟地各三錢廣木香丹皮乳香去油淨沒藥去油淨各五錢骨碎補自然銅紅花瓜兒血竭各三錢硃砂五錢丁香一錢人參一兩虎骨酥油炙二兩古銅錢三文共為細末煉蜜為丸每服三錢淡黃酒童便化服補損接骨仙丹治證同前當歸酒洗川芎白芍炒熟地補骨脂五靈脂廣木香地骨皮防風各五錢乳香去油淨沒藥去油淨瓜兒血竭各一錢上銼一處用夜合花樹根皮五錢同入大酒壺內加燒酒同煮一炷香取出溫服止血定痛生肌散治傷損等證失血過多或因克伐致血氣耗損惡寒發熱煩躁乳香去油淨沒藥去油淨龍骨各三錢血竭二錢黃丹飛過五錢香白芷二錢五分軟石膏煅去火毒一兩潮腦少許共為細末瓷器盛之每以糝患處止痛生肌敷跌打青腫方生梔子同飛羅面搗塗之以布纏裹拔出青毒即消回陽玉龍膏專敷跌打損傷氣虛寒冷草烏炒二錢南星煨一兩軍薑煨一兩白芷一兩赤芍炒一兩肉桂五錢共為末蔥湯調搽熱酒亦可太乙膏治傷口不收貼之生肌長肉香麻油當歸生地生甘草三味入油內炸枯去渣再以絲棉濾淨再入淨鍋熬至滴水不散入炒飛黃丹八兩又用慢火熬至滴水成珠取起少頃入白蠟黃蠟各一兩微火再熬取起少定入去油淨乳香沒藥各五錢攪勻收瓷器內過三宿可貼
