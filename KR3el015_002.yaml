body:
  text: 卷二頭面部巔頂骨巔者頭頂也其骨男子三叉縫女子十字縫一名天靈蓋位居至高內函腦髓如蓋以統全體者也或蹦撞損傷如卒然而死身體強硬鼻口有出入聲氣目閉面如土色心口溫熱跳動者此證可治切不可撅拿並扶起盤坐蓋恐驚亂之氣上衝或從傷處或從七竅走泄必傷性命也惟宜屈膝側臥先將高醋調混元膏敷於頂上以定痛消腫活血拔毒再將草紙卷點著令煙氣熏其口鼻再燃煤淬入醋內使熱氣熏蒸口鼻如無煤之處燒鐵淬之亦可以引五臟血脈使之通和待其口中呻吟有聲即以童便調八釐散溫服可以氣轉陽回外用手法推按心胸兩肋腋下腹上並輕托內腕攢筋頻頻揉摩即掌後高骨寸關尺診脈處也夫衝撞損傷則筋脈強硬頻頻揉摩則心血來復命脈流通即可回生常服正骨紫金丹復外用散瘀和傷湯洗去前敷之混元膏再換敷混元膏服丸藥後或大便色黑乾燥此乃腸胃存有瘀血或有耳聾者俱服加減蘇子桃仁湯以逐瘀血健脾胃養精神兼用導氣通瘀錠塞於耳中飲食宜素粥湯飲忌氣怒油膩麵食臥處宜淨室勿令人喧亂若傷重已死者用白布纏頭以木棍輕輕拍擊足心再提發令其直正安定頸骨舒其筋絡外敷混元膏內服紫金丹若墜車馬損傷巔縫者其邪墜而下多在左而少在右因右手利便而然也其治法同蹦撞諸傷如頂骨塌陷驚動腦髓七竅出血身挺僵厥昏悶全無知覺者不治混元膏治打僕損傷骨碎筋翻瘀血凝聚消青紫腫痛等證羚羊血五錢沒藥五錢漏蘆三錢紅花三錢大黃二錢麝香三錢升麻三錢白及五錢生梔子二錢甘草二錢明雄黃五錢白蘞三錢共為細末用高醋熬成膏敷於頂上八釐散治跌打損傷接骨散瘀蘇木面一錢半兩錢一錢自然銅醋淬七次三錢乳香三錢沒藥三錢血竭三錢麝香一分丁香五分番木鱉油炸去毛一錢共為細末黃酒溫服童便調亦可正骨紫金丹治跌打僕墜閃錯損傷並一切疼痛瘀血凝聚丁香木香瓜兒血竭兒茶熟大黃紅花各一兩當歸頭蓮肉白茯苓白芍各二兩丹皮五錢甘草三錢共為細末煉蜜為丸每服三錢童便調下黃酒亦可散瘀和傷湯治一世蹦撞損傷瘀血積聚番木鱉油炸去毛紅花生半夏各五錢骨碎補甘草各三錢蔥須一兩水五碗煎滾入醋二兩再煎十數滾熏洗患處一日十數次加減蘇子桃仁湯治瘀血內聚心經瘀熱大腸不燥者蘇子三錢蘇木末一錢紅花一錢桃仁炒麥冬橘紅各三錢赤芍竹茹當歸酒洗各二錢水三盅煎一盅渣二盅煎八分溫服導氣通瘀錠專治耳聾奇方用不去油巴豆一個斑蝥三個麝香少許以蔥涎蜂蜜和捻如麥粒形絲棉裹置耳中響聲如雷勿得驚懼待二十一日耳中有膿水流出方可去錠奇妙無比囟骨囟骨者嬰兒頂骨未合軟而跳動之處名曰囟門或跌打損傷骨縫雖綻尚未震傷腦髓筋未振轉其形頭項浮光面虛眼腫鼻大唇翻舌硬睡困昏沉肉雖腫而未皮破出血者宜扶起正坐即以蔥汁合定痛散敷於傷處再以毛頭紙蘸醋貼藥上燒鐵尉斗烙紙上以傷處覺熱疼口中有聲為度去藥貼萬靈膏三日一換待疼止思食始揭去膏以和傷湯洗之則風除腫散血活氣理矣肉破出血者即用馬屁勃灰先止其血次用榆樹皮灸尉法內服人參紫金丹以健脾胃提元氣止渴生津增長精神強壯身體令筋血和通為要忌發物火灑戴抽口穿帶布帽以避風寒不可出房若肉破血流不止骨陷筋翻必損腦髓身軟屈手筋強氣息無聲則危篤難醫若破痕觸冒寒風者不治馬屁勃俗名狗頭灰産口外者佳定痛散治一切打僕風傷定痛消腫舒筋和絡當歸川芎白芍官桂各一錢三奈三錢麝香三分紅花五錢紫丁香根五錢升麻一錢防風一錢共為細末老蔥搗汁合敷患處再用尉法灸尉法此法專以灸尉肉破血出諸傷蓋因血液津漬潮潤以樹皮隔之方灸尉也先以榆樹皮安患處再以老蔥搗爛並蘄艾止痛散和勻置樹皮上連灸五次畢以軟絹包裹戴抽口布帽繫緊帶子謹避風冷萬靈膏治跌打損傷消瘀散毒舒筋活血止痛接骨如神兼去麻木風痰寒濕疼痛等證鸛筋草透骨草紫丁香根當歸酒洗自然銅醋淬七次瓜兒血竭沒藥各一兩川芎八錢赤芍二兩半兩錢醋淬一枚紅花一兩川牛膝五加皮石菖蒲茅山蒼朮各五錢木香秦艽蛇床子肉桂川附子制半夏制石斛萆薢鹿茸各三錢虎脛骨一對麝香二錢上除血竭沒藥麝香三味各研細末另包外共二十三味先將香油十斤微火煨浸三日然後將群藥入油內熬黑為度去滓加黃丹五斤再熬將至滴水成珠離火俟少時藥溫將血竭沒藥麝香下入攪勻取起出火氣人參紫金丹此丹提補元氣健壯脾胃止渴生津增長精神和通筋血被跌僕閃撞而氣虛者最宜服之人參三錢丁香一兩五加皮二兩甘草八錢茯苓二錢當歸酒洗一兩血竭一兩骨碎補一兩五味子一兩沒藥去油二兩共為細末煉蜜為丸每服三錢早晚淡黃酒化服童便化服亦可山角骨山角骨即頭頂兩旁稜骨也凡有跌打損傷未破者不拘左右宣紫腫硬瘀血凝聚疼痛或昏迷目閉身軟而不能起聲氣短少語言不出心中忙亂睡臥喘促飲食少進者宜內服正骨紫金丹外用灸尉如囟骨傷法如肉破流血不止者先用馬屁勃灰止血後以榆樹皮蓋傷處以艾合定痛散灸之如傷重者先服人參紫金丹後如前法如損傷太重成破傷風不治正骨紫金丹見前巔頂傷人參紫金丹見前囟骨傷凌雲骨凌雲骨在前髮際下即正中額骨其兩眉上之骨即俗名左天賢骨右天貴骨兩額角也跌打損傷皮破二目及面浮虛腫若內損瘀血上嘔吐衄氣虛昏沉不省人事身軟面色干黃遍身虛浮躁煩焦渴胸膈疼痛脾胃不開飲食少進先服疏血丸再以五加皮湯熏洗患處敷烏龍膏定痛消腫疏血丸此藥止血開胃百草霜三錢好阿膠蛤粉炒成珠藕節側柏葉茅根當歸酒洗各一兩共為細末煉蜜為丸如梧桐子大每服五錢早晚老酒送下五加皮湯此湯舒筋和血定痛消瘀當歸酒洗沒藥五加皮皮硝青皮川椒香附子各三錢丁香一錢麝香一分老蔥三根地骨皮一錢丹皮二錢水煎滾熏洗患處烏龍膏此膏治跌打損傷筋斷骨折腫硬青紫百草霜三錢白及五錢白蘞三錢百合五錢百部三錢乳香五錢沒藥五錢麝香一分糯米炒一兩陳粉子隔年者佳炒四兩共為細末醋熬為膏睛明骨睛明骨即目窠四圍目眶骨也其上曰眉稜骨其下曰䪼骨䪼骨下接上牙床打僕損傷血流滿面者敷刀瘡藥掀痛瘀血者敷混元膏如骨損者內服八釐散忌生冷發物偶食豬頭肉者必發至一月後始愈凡眼胞傷損而瞳神不碎者可治刀瘡藥治一切金刃所傷敷之止血收口定痛護風上白石膏煅一斤淨板松香水提過一斤珍珠豆腐煮過五錢上三味共研細末和為一處瓷罐收貯備用混元膏八釐散俱見巔頂傷兩顴骨兩顴骨者面上兩旁之高起大骨也打僕損傷青腫堅硬疼痛牙車緊急嚼物艱難鼻孔出血兩唇掀翻內服正骨紫金丹外以海桐皮湯熏洗口漱蓽茇散坐臥避冷處海桐皮湯專洗一切跌打損傷筋骨骨錯疼痛不止海桐皮鐵錢透骨草明淨乳香沒藥各二錢當歸酒洗一錢五分川椒三錢川芎一錢紅花一錢威靈仙白芷甘草防風各八分共為粗末裝白布袋內扎口煎湯熏洗患處蓽茇散蓽茇良薑細辛各一錢水三盅煎一盅漱口正骨紫金丹見兩山角傷鼻梁骨鼻孔之界骨名曰鼻梁骨下至鼻之盡處名曰準頭凡鼻兩孔傷凹者可治血出無妨若鼻梁骨凹陷者用當歸膏敷貼若兩孔跌磕傷開孔竅或金刃傷開孔竅用封口藥敷傷處外以消毒定痛散貼之退腫若鼻被傷落者用綴法封口藥治跌打損傷皮開肉破及金刃傷割喉斷耳缺唇傷破肚皮跌破陰囊皮等證大效明淨乳香沒藥兒茶當歸杉皮炭各一錢麝香五釐片腦一分豬𧰷聹葉如無此葉用葛葉毛藤子葉亦可一錢上各另碾細末稱合和勻入麝碾細次入片腦研勻瓷罐收貯聽用消毒定痛散治跌僕損傷腫硬疼痛無名異炒木耳炒川大黃各五錢共為末蜜水調塗如內有瘀血砭去敷之若腐處更用當歸膏敷之尤好神效當歸膏此膏斂口生肌拔毒止痛並諸瘡毒氣壅盛腐化成膿當歸黃蠟各一兩麻油四兩上將當歸入油煎令焦黑去滓次入黃蠟急攪化放冷以瓷器收貯用時以舊絹布攤貼一方用白蠟綴法耳傷落者同此用人發入陽城罐以鹽泥固濟煅過為末乘急以所傷耳鼻蘸藥安綴故處以軟吸縛定效昔江懷禪師被驢咬落其鼻一僧用此綴之如舊中血堂中血堂即鼻內頞下脆骨空虛處也若被打僕損傷血流不止神氣昏迷者宜塞鼻丹塞於鼻中外復以新汲冷水淋激頭頂視其人如氣虛內服人參紫金丹如血瘀服蘇子桃仁湯服後如血仍不止飲食不進氣虛目閉面黃者八日死凡跌打損傷鼻梁骨者無妨塞鼻丹此丹治跌打損傷鼻中流血不止神氣昏迷牙齒損傷虛浮腫痛者及一切衄血之證皆可用之硃砂麝香丁香烏梅肉川烏草烏當歸三奈各一錢乳香三錢皂角七分共為細末用獨頭蒜泥為丸以絲棉包裹塞於鼻中人參紫金丹見囟骨傷蘇子桃仁湯見巔頂傷唇口唇口者司言食之竅也如跌破擊打上唇而拔缺者用絹片一小條從腦後扎向前來縛合先用桑白皮捻線縫定次以封口藥塗敷次敷截血膏蓋住封口藥不令開落仍忌言語如整下唇傷而拔缺者以絹片從下頦兜縛治同前法截血膏治跌打砍磕諸證能化血破瘀退腫止痛天花粉三兩片子薑黃赤芍藥白芷各一兩上共為細末茶調勻敷瘡口四圍若頭面傷其血不止者急用此藥調塗頸上周圍若手傷則塗臂周圍若傷足則塗腿上若傷各處則塗瘡口周圍使截住其血不來潮作若瘡口肉硬不消者此被風襲也可加獨活用熱酒調敷如又不消則風毒已深肌肉結實加紫荊皮末和敷有必消之理封口藥見鼻柱骨傷玉堂玉堂在口內上齶一名上含其竅即頏顙也若被觸刺傷於左右者惟腫痛而已若觸傷正中之孔則上通於頞必傷鼻孔之卷肉俗名鼻須或再犯空竅俗名玉堂則血流不止以致鼻目皆腫滿面青紫神倦頭暈四肢無力痛連腦髓若傷及會厭與上橫骨輕者易愈重者即不能言若痛連心膈則昏迷沉重急用膩粉冰片敷於紙上貼肉破處以止其血內服正骨紫金丹以散瘀定痛理氣健脾寧神定志復用蟹黃血竭煎湯日漱口二三十次如氣不舒和飲食少進日以柿霜玉露霜牛奶皮奶餅奶酥油並炒糜子面諸物以涼潤將息之則愈地閣骨地閣骨即兩牙車相交之骨又名頦俗名下巴骨上載齒牙打僕損傷者腮唇腫痛牙車振動虛浮飲食不進目閉神昏心熱神亂氣弱體軟用布兜裹繫縛頂上內服大神效活絡丹消瘀散止痛和血理氣健脾再噙化人參紫金丹搽固齒散口漱蓽茇散以去牙根腫痛外貼萬靈膏忌風寒冷物戒氣惱大神效活絡丹此丹宣暢氣血通利經絡並風濕諸痹口眼喎斜半身不遂行步艱難筋骨拘攣手足疼痛等證白花蛇酒浸焙烏梢蛇酒浸焙麻黃去節防風炙草官桂草豆蔻羌活元參天麻藿香何首烏白芷川連黃各二兩黃耆熟地黃川大黃遼細辛赤芍藥硃砂水飛沒藥去油乳香去油直殭蠶去黑嘴炒天竺黃敗龜板酥炙丁香虎脛骨酥炙烏藥青皮黑附子白蔻仁炒骨碎補白茯苓於白朮土炒當歸酒洗沉香各一兩全蠍去毒葛根威靈仙酒浸各二兩五錢瓜兒血竭犀角各七錢五分麝香五錢地龍去土五錢淨松香五錢兩頭尖川芎各二兩京牛黃二錢五分片腦二錢五分共為紅末煉蜜為丸金鉑為衣每丸重一錢以蠟皮封裹溫酒送隨病上下食前後服人參紫金丹見山角骨傷固齒散見齒傷蓽茇散見兩顴傷萬靈膏見巔頂傷齒齒者口齦所生之骨也俗名曰牙有門牙虎牙槽牙上下盡根牙之別凡被跌打砍磕落去牙齒者只用補骨散敷之並封口藥內服破血藥以止其痛其藥只用水煎不宜酒煎此法頗收功效如牙斷跌磕砍傷牙齒未動者用芙蓉膏塗之如齒動者用蒺藜根燒存性為末常揩搽之即牢用固齒散時時揩之亦佳補肌散止血除痛闢風續筋骨生肌肉地黃苗地菘青蒿蒼耳苗赤芍藥水煎取汁各五兩生艾汁三合上五月五日七月七日午時修合以前藥汁拌石灰陰乾入黃丹三兩更杵為細末凡有傷折出血用藥包封不可動約十日可瘥不腫不膿芙蓉膏治打僕傷損腫痛紫黑色久不退者紫荊皮南星各一兩芙蓉二兩獨活白芷赤芍藥各五錢上共為末用生薑汁茶清調溫貼敷傷損紫黑色久不退者加肉桂五錢固齒散骨碎補牡鼠骨煅灰共研細末瓷罐收貯聽用封口藥見鼻柱骨傷扶桑骨扶桑骨即兩額骨旁近太陽肉內凹處也若跌僕損傷或焮腫或血出或青紫堅硬頭疼耳鳴青痕滿面憎寒惡冷心中發熱大便乾燥宜內服正骨紫金丹如破損者外以灸尉法定痛外破者烏龍膏敷之正骨紫金丹灸尉法俱見巔頂骨傷烏龍膏方見凌雲骨傷耳耳者司聽之竅也耳門之名曰蔽耳輪之名曰郭凡耳被砍跌打落或上脫下黏或下脫上黏內用封口藥外用消毒定痛散敷貼及耳後看脫落所向用鵝翎橫夾定卻用竹夾子直上橫縛定縛時要兩耳相對輕輕縛住或用綴法封口藥消毒定痛散俱見鼻柱骨傷綴法見鼻柱骨傷玉梁骨玉梁骨即耳門骨其處上即曲頰下即頰車兩骨之合鉗也耳門內上通腦髓亦關靈明若墊傷擊傷而有礙於骨肉者腫痛流血服正骨紫金丹八仙逍遙湯洗之洗畢貼混元膏坐臥避冷處若傷重內連腦髓及傷靈明必昏沉不省人事不進飲食若再平素氣血皆虛必為不治之證八仙逍遙湯專洗跌僕損傷腫硬疼痛及一切冷振風濕筋骨血肉肢體痠痛諸證防風荊芥川芎甘草各一錢當歸酒洗黃柏各二錢茅山蒼朮牡丹皮川椒各三錢苦參五錢共合一處裝白布袋內扎口水熬滾熏洗患處兩釣骨兩釣骨名曲頰即上頰之合鉗曲如環形以納下牙車骨尾之鉤者也打僕損傷耳腫腮硬牙關緊急嚼物不合宜內服正骨紫金丹外貼萬靈膏坐臥避冷處正骨紫金丹萬靈膏俱見巔頂傷頰車骨頰車骨即下牙床骨也俗名牙釣承載諸齒能咀食物有運動之象故名頰車其骨尾形如鉤上控於曲頰之環或打僕脫臼或因風濕襲入鉤環脫臼單脫者為錯雙脫者為落凡治單脫者用手法摘下不脫者以兩手捧下頦稍外拽復向內托之則雙皆入上環矣再以布自地閣纏繞頭頂以固之宜內服正骨紫金丹外貼萬靈膏待能飲食後去布只用布兜其下頦繫於頂上二三日可愈若雙脫者治法同前若缺而致脫臼者乃突滑也無妨脫臼者俗名吊下巴缺者俗名打哈氣正骨紫金丹萬靈膏方俱見巔頂傷後山骨後山即頭後枕骨也其骨形狀不同或如品字或如山字或如川字或圓尖或月芽形或偃月形或雞子形皆屬枕骨凡有傷損其人頭昏目眩耳鳴有聲項強咽直飲食難進坐臥不安四肢無力內服正骨紫金丹外敷烏龍膏洗以海桐皮湯以散瘀去麻木止痛如誤從高處墜下後山骨傷太重筋翻氣促痰響如拽鋸之聲垂頭目閉有喘聲者此風熱所乘至危之證不能治也遺尿者必亡惟月芽形者更易受傷如被墜墮打傷震動蓋頂骨縫以致腦筋轉擰疼痛昏迷不省人事少時或明者其人可治急以涼水蘸發啓開牙關以酒調八釐散灌之服後目開痛苦有聲二目流淚愈見可治之兆服正骨紫金丹炒米粥調養可愈正骨紫金丹見巔頂傷烏龍膏見凌雲骨傷海桐皮湯見兩顴骨傷八釐散見巔頂傷壽臺骨壽臺骨即完骨在耳後接於耳之玉樓骨者也若跌打損傷其耳上下俱腫起耳內之禁骨有傷則見血膿水耳外瘀聚凝結疼痛筋結不能舒通以致頭暈眼迷兩太陽扶桑骨脹痛頸項筋強虛浮紅紫精神短少四肢無力坐臥不安飲食少進以烏龍膏敷耳傷處用絲棉裹導氣通瘀錠塞耳內內服人參紫金丹通瘀散腫外用以八仙逍遙湯熏洗消散虛浮腫痛忌食熱物發物如血流不止三日不飲食必動腦髓不宜治之烏龍膏見凌雲骨傷導氣通瘀錠見巔頂骨傷人參紫金丹見山角骨傷八仙逍遙湯見玉梁骨傷旋臺骨旋臺骨又名玉柱骨即頭後頸骨三節也一名天柱骨此骨被傷共分四證一曰從高墜下致頸骨插入腔內而左右尚活動者用提項法治之一曰打傷頭低不起用端法治之一曰墜傷左右歪斜用整法治之一曰僕傷面仰頭不能垂或筋長骨錯或筋聚或筋強骨隨頭低用推端續整四法治之凡治者臨證時問其或墜車馬踒傷或高處墜下折傷或打重跌倒再問其或思飲食或不思飲食或四肢無傷而精神不減或精神短少或能坐起行走或昏睡不語或疼痛不止瘀聚凝結腫硬筋脹皆宜內服正骨紫金丹外敷萬靈膏並洗海桐皮湯灸尉定痛散外按手法治之手法詳首卷正骨紫金丹萬靈膏俱見巔頂傷海桐皮湯見兩顴骨傷定痛散見兩山角骨傷
